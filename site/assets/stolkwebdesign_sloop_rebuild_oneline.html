<div id="play-btn" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.4);z-index:10;"><div style="width:64px;height:64px;border-radius:50%;border:2px solid rgba(255,255,255,0.8);display:flex;align-items:center;justify-content:center;"><div style="width:0;height:0;border-left:22px solid rgba(255,255,255,0.9);border-top:13px solid transparent;border-bottom:13px solid transparent;margin-left:4px;"></div></div></div>
<div id="replay-btn" style="position:absolute;bottom:20px;left:50%;transform:translateX(-50%);opacity:0;z-index:10;cursor:pointer;"><div style="padding:8px 20px;border:1px solid rgba(255,255,255,0.3);border-radius:20px;font-size:12px;color:#fff;font-family:var(--font-sans);">Opnieuw</div></div>

<div style="text-align:center;margin-top:12px;font-size:13px;color:var(--color-text-secondary);">Klik om af te spelen</div>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d'),reel=document.getElementById('reel'),oldLogo=document.getElementById('old-logo'),playBtn=document.getElementById('play-btn'),replayBtn=document.getElementById('replay-btn');
let animId=null,running=false,particles=[];
const W=()=>reel.offsetWidth,H=()=>reel.offsetHeight;
function resize(){canvas.width=W()*2;canvas.height=H()*2;ctx.scale(2,2);}
resize();
const DUR=12;
function ease(t){return t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}

function initParticles(w,h){
  particles=[];
  const s=4,cx=w/2,cy=h/2,lw=260,lh=100,sx=cx-lw/2,sy=cy-lh/2;
  for(let x=0;x<lw;x+=s)for(let y=0;y<lh;y+=s){
    const blue=x<lw*.35&&y<lh*.8;
    particles.push({x:sx+x,y:sy+y,ox:sx+x,oy:sy+y,tx:0,ty:0,s:s-1,
      col:blue?`hsl(210,97%,${55+Math.random()*15}%)`:`hsl(0,0%,${85+Math.random()*15}%)`,
      tcol:'#fff',a:0,rs:(Math.random()-.5)*.2,d:Math.random()*.5,i:particles.length,
      ex:0,ey:0});
  }
  // Compute explosion vectors once
  for(const p of particles){
    const ang=Math.atan2(p.oy-cy,p.ox-cx)+(Math.random()-.5)*.5;
    const dist=150+Math.random()*250;
    p.ex=Math.cos(ang)*dist;p.ey=Math.sin(ang)*dist;
  }
  // Target: one-line text
  const off=document.createElement('canvas');off.width=w*2;off.height=h*2;
  const oc=off.getContext('2d');
  oc.fillStyle='#fff';oc.font="900 22px 'Archivo Black','Arial Black',Impact,sans-serif";
  oc.textAlign='center';oc.textBaseline='middle';
  oc.fillText('STOLKWEBDESIGN',w,h);
  const mw=oc.measureText('STOLKWEBDESIGN').width;
  oc.fillStyle='#EA2525';oc.fillText('®',w+mw/2+11,h);
  const id=oc.getImageData(0,0,w*2,h*2),tp=[];
  for(let py=0;py<h*2;py+=s*2)for(let px=0;px<w*2;px+=s*2){
    const i=(py*w*2+px)*4;
    if(id.data[i+3]>128)tp.push({x:px/2,y:py/2,r:id.data[i]>200&&id.data[i+1]<100});
  }
  for(let i=0;i<particles.length;i++){
    if(i<tp.length){particles[i].tx=tp[i].x;particles[i].ty=tp[i].y;particles[i].tcol=tp[i].r?'#EA2525':'#fff';}
    else{particles[i].tx=Math.random()*w;particles[i].ty=-50-Math.random()*200;particles[i].tcol='transparent';}
  }
}

function start(){
  if(running)return;running=true;
  playBtn.style.opacity='0';playBtn.style.pointerEvents='none';
  replayBtn.style.opacity='0';oldLogo.style.opacity='1';oldLogo.style.transform='';
  const w=W(),h=H();initParticles(w,h);
  const t0=performance.now();
  function frame(now){
    const el=(now-t0)/1000;ctx.clearRect(0,0,w,h);
    if(el<2){/* calm */}
    else if(el<2.8){
      const int=(el-2)/.8;
      oldLogo.style.transform=`translate(${(Math.random()-.5)*12*int}px,${(Math.random()-.5)*8*int}px)`;
      if(int>.4){ctx.strokeStyle=`rgba(234,37,37,${int*.6})`;ctx.lineWidth=1;
        for(let i=0;i<int*6;i++){const cx=w/2+(Math.random()-.5)*200,cy=h/2+(Math.random()-.5)*80;
          ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+(Math.random()-.5)*40,cy+(Math.random()-.5)*30);ctx.stroke();}}
    }
    else if(el<4.2){
      oldLogo.style.opacity='0';oldLogo.style.transform='';
      const t=(el-2.8)/1.4;
      for(const p of particles){
        const et=Math.min(1,Math.max(0,(t-p.d)/(1-p.d))),e=ease(et);
        p.x=p.ox+p.ex*e;p.y=p.oy+p.ey*e;p.a+=p.rs;
        ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.a);ctx.fillStyle=p.col;
        ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s);ctx.restore();
      }
    }
    else if(el<5.8){
      for(const p of particles){
        p.x+=Math.sin(el*2+p.i)*.8;p.y+=Math.cos(el*1.5+p.i*.7)*.6;p.a+=p.rs*.5;
        ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.a);ctx.fillStyle=p.col;ctx.globalAlpha=.8;
        ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s);ctx.restore();
      }
    }
    else if(el<8.5){
      const t=(el-5.8)/2.7;
      for(const p of particles){
        const et=Math.min(1,Math.max(0,(t-p.d*.3)/(1-p.d*.3))),e=ease(et);
        p.x+=(p.tx-p.x)*e*.15;p.y+=(p.ty-p.y)*e*.15;p.a*=(1-e*.1);
        ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.a*(1-e));
        ctx.fillStyle=e>.7?p.tcol:p.col;ctx.globalAlpha=p.tcol==='transparent'?1-e:1;
        ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s);ctx.restore();
      }
    }
    else{
      ctx.font="900 22px 'Archivo Black','Arial Black',Impact,sans-serif";
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#fff';
      ctx.fillText('STOLKWEBDESIGN',w/2,h/2);
      const mw=ctx.measureText('STOLKWEBDESIGN').width;
      ctx.fillStyle='#EA2525';ctx.fillText('®',w/2+mw/2+11,h/2);
    }
    if(el>DUR){running=false;replayBtn.style.opacity='1';return;}
    animId=requestAnimationFrame(frame);
  }
  animId=requestAnimationFrame(frame);
}
playBtn.addEventListener('click',start);
replayBtn.addEventListener('click',()=>{if(animId)cancelAnimationFrame(animId);running=false;oldLogo.style.opacity='1';oldLogo.style.transform='';start();});
</script>
