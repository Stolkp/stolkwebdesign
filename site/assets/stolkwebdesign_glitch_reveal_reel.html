<script>
const fxCanvas = document.getElementById('fx');
const fxCtx = fxCanvas.getContext('2d');
const reel = document.getElementById('reel');
const oldLogo = document.getElementById('old-logo');
const newLogo = document.getElementById('new-logo');
const playBtn = document.getElementById('play-btn');
const replayBtn = document.getElementById('replay-btn');

let animId = null;
let running = false;

function resize() {
  fxCanvas.width = reel.offsetWidth * 2;
  fxCanvas.height = reel.offsetHeight * 2;
}
resize();

const W = () => reel.offsetWidth;
const H = () => reel.offsetHeight;

// --- Glitch schedule ---
// Phase 1 (0-3s): calm, old logo, maybe 1 tiny glitch
// Phase 2 (3-7s): glitches start, short flashes of new logo
// Phase 3 (7-10s): intense glitching, longer new logo flashes
// Phase 4 (10-12s): rapid switching, then new logo wins
// Phase 5 (12-15s): new logo stays, calm

const totalDuration = 14;

// Predefined glitch events: [startTime, duration, intensity, showNew]
const glitchEvents = [
  // Phase 1 - subtle hints
  { t: 1.8, dur: 0.06, intensity: 0.3, showNew: false },
  { t: 2.5, dur: 0.04, intensity: 0.2, showNew: false },

  // Phase 2 - glitches with new logo peeks
  { t: 3.2, dur: 0.12, intensity: 0.5, showNew: true },
  { t: 3.8, dur: 0.06, intensity: 0.4, showNew: false },
  { t: 4.4, dur: 0.15, intensity: 0.6, showNew: true },
  { t: 4.9, dur: 0.04, intensity: 0.3, showNew: false },
  { t: 5.5, dur: 0.18, intensity: 0.6, showNew: true },
  { t: 6.0, dur: 0.08, intensity: 0.5, showNew: false },
  { t: 6.4, dur: 0.2, intensity: 0.7, showNew: true },

  // Phase 3 - more intense, longer peeks
  { t: 7.0, dur: 0.25, intensity: 0.8, showNew: true },
  { t: 7.5, dur: 0.1, intensity: 0.6, showNew: false },
  { t: 7.8, dur: 0.3, intensity: 0.8, showNew: true },
  { t: 8.3, dur: 0.08, intensity: 0.5, showNew: false },
  { t: 8.5, dur: 0.35, intensity: 0.9, showNew: true },
  { t: 9.0, dur: 0.12, intensity: 0.7, showNew: false },
  { t: 9.2, dur: 0.4, intensity: 0.9, showNew: true },

  // Phase 4 - rapid fire takeover
  { t: 9.8, dur: 0.08, intensity: 1.0, showNew: false },
  { t: 9.95, dur: 0.1, intensity: 1.0, showNew: true },
  { t: 10.1, dur: 0.06, intensity: 1.0, showNew: false },
  { t: 10.2, dur: 0.15, intensity: 1.0, showNew: true },
  { t: 10.4, dur: 0.04, intensity: 1.0, showNew: false },
  { t: 10.5, dur: 0.08, intensity: 1.0, showNew: true },
  { t: 10.65, dur: 0.03, intensity: 0.8, showNew: false },
  { t: 10.7, dur: 0.5, intensity: 1.0, showNew: true },
];

const newLogoLocksAt = 11.2;

function drawGlitchFX(w, h, intensity) {
  const cw = w * 2;
  const ch = h * 2;

  // RGB shift - horizontal color bands
  const numBands = Math.floor(3 + intensity * 8);
  for (let i = 0; i < numBands; i++) {
    const y = Math.random() * ch;
    const bandH = 2 + Math.random() * 20 * intensity;
    const shift = (Math.random() - 0.5) * 40 * intensity;

    fxCtx.fillStyle = `rgba(${Math.random() > 0.5 ? '234,37,37' : '25,151,252'}, ${0.08 + intensity * 0.15})`;
    fxCtx.fillRect(shift, y, cw, bandH);
  }

  // Horizontal displacement lines
  const numLines = Math.floor(2 + intensity * 12);
  for (let i = 0; i < numLines; i++) {
    const y = Math.random() * ch;
    const lineH = 1 + Math.random() * 4;
    fxCtx.fillStyle = `rgba(255,255,255,${0.03 + intensity * 0.08})`;
    fxCtx.fillRect(0, y, cw, lineH);
  }

  // Static noise blocks
  if (intensity > 0.5) {
    const numBlocks = Math.floor(intensity * 6);
    for (let i = 0; i < numBlocks; i++) {
      const bx = Math.random() * cw;
      const by = Math.random() * ch;
      const bw = 10 + Math.random() * 80 * intensity;
      const bh = 2 + Math.random() * 10;
      fxCtx.fillStyle = `rgba(255,255,255,${0.05 + Math.random() * 0.1})`;
      fxCtx.fillRect(bx, by, bw, bh);
    }
  }

  // Screen tear - big horizontal offset
  if (intensity > 0.7 && Math.random() < 0.6) {
    const tearY = Math.random() * ch;
    const tearH = 20 + Math.random() * 60;
    fxCtx.fillStyle = `rgba(0,0,0,0.8)`;
    fxCtx.fillRect(0, tearY, cw, tearH);
  }
}

function startAnimation() {
  if (running) return;
  running = true;
  playBtn.style.opacity = '0';
  playBtn.style.pointerEvents = 'none';
  replayBtn.style.opacity = '0';
  oldLogo.style.opacity = '1';
  oldLogo.style.transform = '';
  newLogo.style.opacity = '0';
  newLogo.style.transform = '';

  const startTime = performance.now();

  function frame(now) {
    const elapsed = (now - startTime) / 1000;
    const w = W();
    const h = H();

    fxCtx.clearRect(0, 0, w * 2, h * 2);

    // Check if we're in a glitch event
    let inGlitch = null;
    for (const g of glitchEvents) {
      if (elapsed >= g.t && elapsed < g.t + g.dur) {
        inGlitch = g;
        break;
      }
    }

    if (elapsed >= newLogoLocksAt) {
      // New logo wins
      oldLogo.style.opacity = '0';
      newLogo.style.opacity = '1';
      newLogo.style.transform = '';
      oldLogo.style.transform = '';

      // Gentle ambient scanline
      if (elapsed < newLogoLocksAt + 0.5) {
        drawGlitchFX(w, h, 0.15);
      }

    } else if (inGlitch) {
      const g = inGlitch;

      // Show/hide logos
      if (g.showNew) {
        oldLogo.style.opacity = '0';
        newLogo.style.opacity = '1';
        // Offset the new logo slightly for glitch feel
        const xShift = (Math.random() - 0.5) * 8 * g.intensity;
        newLogo.style.transform = `translateX(${xShift}px)`;
      } else {
        oldLogo.style.opacity = '1';
        newLogo.style.opacity = '0';
        const xShift = (Math.random() - 0.5) * 10 * g.intensity;
        oldLogo.style.transform = `translateX(${xShift}px)`;
      }

      drawGlitchFX(w, h, g.intensity);

    } else {
      // Calm - old logo
      oldLogo.style.opacity = '1';
      newLogo.style.opacity = '0';
      oldLogo.style.transform = '';
      newLogo.style.transform = '';

      // Very subtle ambient noise after phase 1
      if (elapsed > 3) {
        const ambient = 0.02 + (elapsed / totalDuration) * 0.05;
        if (Math.random() < 0.3) {
          const y = Math.random() * h * 2;
          fxCtx.fillStyle = `rgba(255,255,255,0.02)`;
          fxCtx.fillRect(0, y, w * 2, 1);
        }
      }
    }

    if (elapsed > totalDuration) {
      running = false;
      replayBtn.style.opacity = '1';
      oldLogo.style.transform = '';
      newLogo.style.transform = '';
      return;
    }

    animId = requestAnimationFrame(frame);
  }

  animId = requestAnimationFrame(frame);
}

playBtn.addEventListener('click', startAnimation);
replayBtn.addEventListener('click', () => {
  if (animId) cancelAnimationFrame(animId);
  running = false;
  startAnimation();
});
</script>
